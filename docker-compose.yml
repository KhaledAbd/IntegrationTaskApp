version: '3.8'

services:
  github-integration-api:
    build:
      context: .
      dockerfile: src/GitHubIntegrationApi/Dockerfile
    image: github-integration-api:dev
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || curl -f http://localhost:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    depends_on:
      github-integration-service:
        condition: service_healthy
    networks:
      - appnet
    volumes:
      - github-api-data:/app_data

  github-integration-service:
    build:
      context: .
      dockerfile: src/GitHubIntegrationService/Dockerfile
    image: github-integration-service:dev
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - appnet
    volumes:
      - github-service-data:/app_data

  github-repository-monitor:
    build:
      context: .
      dockerfile: src/github-repository-monitor/Dockerfile
    image: github-repository-monitor:dev
    ports:
      - "4200:80"
    environment:
      - API_URL=http://localhost:8080
    depends_on:
      github-integration-api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - appnet
    volumes:
      - ./src/github-repository-monitor/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  github-pusher:
    build:
      context: src/github-pusher
      dockerfile: Dockerfile
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - GITHUB_TOKEN=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
      - REPO_OWNER=KhaledAbd
      - REPO_NAME=IntegrationTaskApp
    restart: unless-stopped
    networks:
      - appnet

networks:
  appnet:
    driver: bridge

volumes:
  github-api-data:
  github-service-data:
