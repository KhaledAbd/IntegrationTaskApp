<section class="monitor-section scheduled-section">
  <div class="section-header-row">
    <div class="section-header">
      <lucide-icon [name]="HistoryIcon" class="icon-scheduled"></lucide-icon>
      <h2>Scheduled Commits</h2>
      <div class="sync-info" *ngIf="lastSyncTime">
        Last Sync:
        <strong>{{ lastSyncTime | date: 'MMM d, h:mm:ss a' }}</strong>
      </div>
    </div>
  </div>

  <kendo-grid 
    [data]="gridView" 
    [loading]="loading" 
    [height]="500"
    [pageable]="true"
    [pageSize]="pageSize"
    [skip]="skip"
    (pageChange)="onPageChange($event)"
    class="premium-grid"
    [navigable]="true"
  >
    <ng-template kendoGridToolbarTemplate>
      <div class="toolbar-content" [formGroup]="filterForm">
        <kendo-textbox
          [style.width.px]="250"
          placeholder="Search in all columns..."
          rounded="full"
          formControlName="searchText"
          (valueChange)="refresh()"
        >
          <ng-template kendoTextBoxPrefixTemplate>
            <kendo-svgicon [icon]="searchSVG"></kendo-svgicon>
          </ng-template>
        </kendo-textbox>
        
        <div class="filter-group date-filter-inline">
          <kendo-daterange>
            <kendo-dateinput
              kendoDateRangeStartInput
              formControlName="startDate"
              placeholder="Start"
              class="responsive-date"
              [style.width.px]="120"
            ></kendo-dateinput>
            <kendo-dateinput
              kendoDateRangeEndInput
              formControlName="endDate"
              placeholder="End"
              class="responsive-date"
              [style.width.px]="120"
            ></kendo-dateinput>
          </kendo-daterange>
        </div>

        <kendo-grid-spacer></kendo-grid-spacer>
        
        <button kendoButton [themeColor]="'secondary'" (click)="refresh()" [disabled]="loading" fillMode="flat">
          <kendo-svgicon [icon]="refreshSVG" [class.spin]="loading"></kendo-svgicon>
        </button>
        
        <button kendoGridExcelCommand type="button" [svgIcon]="excelSVG" fillMode="outline">
          Export to Excel
        </button>
        <button kendoGridPDFCommand [svgIcon]="pdfSVG" fillMode="outline">
          Export to PDF
        </button>
      </div>
    </ng-template>

    <kendo-grid-column field="message" title="Commit Message">
      <ng-template kendoGridCellTemplate let-dataItem>
        <div class="commit-msg-cell">
          <span class="message-text">{{ dataItem.message }}</span>
        </div>
      </ng-template>
    </kendo-grid-column>

    <kendo-grid-column field="authorName" title="Author" [width]="180">
      <ng-template kendoGridCellTemplate let-dataItem>
        <div class="author-cell">
          <span class="author-name">{{ dataItem.authorName }}</span>
        </div>
      </ng-template>
    </kendo-grid-column>
    
    <kendo-grid-column field="date" title="Date" [width]="200">
      <ng-template kendoGridCellTemplate let-dataItem>
        <span class="date-text">{{ dataItem.date | date: 'MMM d, y, h:mm a' }}</span>
      </ng-template>
    </kendo-grid-column>
    
    <kendo-grid-column field="sha" title="SHA" [width]="120">
      <ng-template kendoGridCellTemplate let-dataItem>
        <code class="sha">{{ dataItem.sha?.substring(0, 7) }}</code>
      </ng-template>
    </kendo-grid-column>

    <kendo-grid-pdf
      fileName="ScheduledCommits.pdf"
      [repeatHeaders]="true"
    ></kendo-grid-pdf>
    <kendo-grid-excel fileName="ScheduledCommits.xlsx"></kendo-grid-excel>
  </kendo-grid>
</section>
